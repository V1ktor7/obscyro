services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: obscyro-postgres
    environment:
      POSTGRES_USER: obscyro
      POSTGRES_PASSWORD: obscyro_dev_password
      POSTGRES_DB: obscyro
    ports:
      - "5435:5432"
    volumes:
      - obscyro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obscyro -d obscyro"]
      interval: 5s
      timeout: 5s
      retries: 12

  nlp:
    build: ../nlp-service
    container_name: obscyro-nlp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://obscyro:obscyro_dev_password@postgres:5432/obscyro
      HF_HOME: /models
    ports:
      - "5000:5000"
    volumes:
      # Cache the sentence-transformers embedding model across container rebuilds.
      - obscyro_nlp_models:/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  obscyro_pgdata:
  obscyro_nlp_models:
